<script>
function convertUtcTimes(){
    document.querySelectorAll('.utc-time').forEach(function(el){
        var ts=parseInt(el.dataset.ts)*1000;
        var d=new Date(ts);
        if(isNaN(d.getTime()))return;
        if(el.dataset.format==='time'){
            el.textContent=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
        }else{
            el.textContent=d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
        }
    });
}
convertUtcTimes();
</script>
